<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلب صوتي - المطعم</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8f6f2;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #ffffff;
        max-width: 480px;
        width: 100%;
        padding: 40px 32px 48px;
        border-radius: 32px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        text-align: center;
      }
      .icon-circle {
        width: 72px;
        height: 72px;
        background: #1a1a1a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 32px;
        color: #fff;
      }
      h1 {
        font-size: 26px;
        font-weight: 600;
        color: #1a1a1a;
      }
      .sub {
        font-size: 15px;
        color: #6b6b6b;
        margin: 6px 0 28px;
      }
      .status-box {
        background: #f4f2ee;
        border-radius: 60px;
        padding: 12px 20px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #3a3a3a;
        margin-bottom: 28px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #b0b0b0;
      }
      .dot.connected {
        background: #2b9c5c;
      }
      .dot.error {
        background: #d14c4c;
      }
      .btn {
        width: 100%;
        padding: 16px 24px;
        border: none;
        border-radius: 60px;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
      }
      .btn-primary {
        background: #1a1a1a;
        color: #fff;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-danger {
        background: #eae8e4;
        color: #1a1a1a;
        margin-top: 12px;
      }
      .btn-danger:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon-circle">🎙️</div>
      <h1>طلب صوتي</h1>
      <p class="sub">تكلّم مع المساعد الصوتي وسجل طلبك</p>

      <div class="status-box">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">غير متصل</span>
      </div>

      <button class="btn btn-primary" id="joinBtn">▶ ابدأ المحادثة</button>
      <button class="btn btn-danger" id="leaveBtn" disabled>
        ✕ إنهاء المكالمة
      </button>
    </div>

    <script>
      const TOKEN_SERVER =
        "https://voice-order-token-vercel.vercel.app/api/token";
      const ROOM_NAME = "voice-order-room";

      const joinBtn = document.getElementById("joinBtn");
      const leaveBtn = document.getElementById("leaveBtn");
      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");

      let room = null;

      function setStatus(label, type) {
        statusText.textContent = label;
        statusDot.className = "dot" + (type ? " " + type : "");
      }

      async function generateToken(roomName, participantName) {
        const response = await fetch(TOKEN_SERVER, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ roomName, participantName }),
        });
        const data = await response.json();
        if (typeof data.token !== "string") {
          throw new Error("Token response invalid: " + JSON.stringify(data));
        }
        return data;
      }

      async function joinRoom() {
        try {
          setStatus("جاري الاتصال...", "");
          joinBtn.disabled = true;

          const LiveKit = window.LivekitClient;
          const participantId =
            "user-" + Math.random().toString(36).substring(2, 8);
          const { token, url } = await generateToken(ROOM_NAME, participantId);

          room = new LiveKit.Room({ adaptiveStream: true, dynacast: true });

          // Play back any audio track published by the agent
          room.on(LiveKit.RoomEvent.TrackSubscribed, (track) => {
            if (track.kind === "audio") {
              const el = track.attach();
              el.autoplay = true;
              document.body.appendChild(el);
            }
          });

          room.on(LiveKit.RoomEvent.Disconnected, () => {
            setStatus("تم الفصل", "");
            joinBtn.disabled = false;
            leaveBtn.disabled = true;
            room = null;
          });

          await room.connect(url, token);
          await room.localParticipant.setMicrophoneEnabled(true);

          setStatus("متصل ✓", "connected");
          leaveBtn.disabled = false;
        } catch (err) {
          console.error("فشل الاتصال:", err);
          setStatus("فشل الاتصال: " + err.message, "error");
          joinBtn.disabled = false;
        }
      }

      async function leaveRoom() {
        if (room) {
          await room.disconnect();
          room = null;
        }
        setStatus("غير متصل", "");
        joinBtn.disabled = false;
        leaveBtn.disabled = true;
      }

      joinBtn.addEventListener("click", joinRoom);
      leaveBtn.addEventListener("click", leaveRoom);
    </script>
  </body>
</html>
